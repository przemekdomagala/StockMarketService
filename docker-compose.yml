services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stock_market
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d stock_market"]
      interval: 10s
      timeout: 5s
      retries: 5

  stock-app:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/stock_market
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    deploy:
      replicas: 2 # <- running 2 copies of service for high availability
    depends_on:
      db:
        condition: service_healthy

  load_balancer:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - stock-app